<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Prosocial Design Inc.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Playfair+Display:wght@800;900&amp;display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%23faf8f5'/><text y='72' x='14' font-size='68' font-family='serif' font-weight='900' fill='%239b59b6'>P</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-page h1 {
      font-family: var(--font-display);
      font-size: clamp(4rem, 15vw, 10rem);
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 1rem;
    }
    .error-page p {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }
    .error-page a {
      display: inline-block;
      border: 2px solid var(--accent);
      color: var(--accent);
      padding: 0.8rem 2rem;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: background 0.25s, color 0.25s;
    }
    .error-page a:hover {
      background: var(--accent);
      color: #fff;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <h1>404</h1>
      <p>This page doesn't exist. The future we're building does.</p>
      <a href="/">Back to home</a>
    </div>
  </div>
</body>
</html>
